<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Market Survey Dashboard — McKinney / Allen</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #ffffff;
  color: #222;
}
.page {
  max-width: 1100px;
  margin: 0 auto;
  padding: 32px 24px 64px;
}
.page-header {
  text-align: center;
  margin-bottom: 24px;
}
.page-header h1 {
  font-size: 34px;
  margin: 0 0 6px;
  color: #1B2A4A;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.page-header .subtitle {
  color: #555;
  font-size: 14px;
  letter-spacing: 0.4px;
}
.freshness-banner {
  margin: 24px 0;
  padding: 14px 18px;
  border: 1px solid #E0E3EC;
  border-radius: 8px;
  background: #FAFBFD;
  font-size: 13px;
  color: #333;
}
.freshness-banner strong { color: #1B2A4A; }
.freshness-banner .status-live { color: #1e7a3c; font-weight: 600; }
.freshness-banner .status-missing { color: #9a3030; font-weight: 600; }
.section {
  margin-top: 40px;
}
.section + .section {
  border-top: 1px solid #E0E3EC;
  padding-top: 40px;
}
.section-header {
  background: #1B2A4A;
  color: #fff;
  padding: 18px 24px;
  border-radius: 8px 8px 0 0;
}
.section-header .section-title {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: 0.3px;
}
.section-header .section-subtitle {
  font-size: 13px;
  opacity: 0.85;
  margin-top: 2px;
}
.chart-wrap {
  background: #fff;
  border: 1px solid #E0E3EC;
  border-top: none;
  padding: 20px;
  height: 600px;
}
.market-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 0;
  font-size: 13px;
  border: 1px solid #E0E3EC;
  border-top: none;
}
.market-table th,
.market-table td {
  padding: 10px 12px;
  text-align: left;
}
.market-table .table-title-row th {
  background: #1B2A4A;
  color: #fff;
  font-weight: 700;
  text-align: center;
  font-size: 14px;
  letter-spacing: 0.4px;
  padding: 12px;
}
.market-table .table-header-row th {
  background: #1B2A4A;
  color: #fff;
  font-weight: 700;
  text-align: center;
  font-size: 12px;
  letter-spacing: 0.3px;
  border-top: 1px solid #2e3f63;
}
.market-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
.market-table tr.data-row { background: #ffffff; }
.market-table tr.data-row.alt { background: #F6F7FA; }
.market-table tr.no-data-row .no-data-cell {
  color: #888;
  font-style: italic;
  text-align: center;
}
.market-table a.prop-name {
  color: #2C3E50;
  text-decoration: none;
}
.market-table a.prop-name:hover { text-decoration: underline; }
.market-table a.prop-name.subject {
  color: #1B2A4A;
  font-weight: 700;
}
.market-table td.prop-cell { padding-left: 14px; }
</style>
</head>
<body>
<div class="page">
  <div class="page-header">
  <h1>Market Survey Dashboard</h1>
  <div class="subtitle">April 10, 2026 &middot; McKinney / Allen &middot; DFW</div>
</div>
  <div class="freshness-banner"><strong>Live data:</strong> <em>none</em><br/><strong>Unavailable:</strong> <span class="status-missing">Collin Square</span>, <span class="status-missing">Davis at the Square</span>, <span class="status-missing">Kinstead</span>, <span class="status-missing">Magnolia on the Green</span>, <span class="status-missing">McKinney Terrace</span>, <span class="status-missing">The Bridge at McKinney</span>, <span class="status-missing">The Links at Twin Creeks</span></div>
  
</div>
<script>

</script>
</body>
</html>
